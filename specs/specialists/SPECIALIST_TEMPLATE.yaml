# Reusable specialist authoring template.
# This is a future source-of-truth authoring input, not an active runtime loader.
schema_version: "v2.1"
artifact_kind: specialist_definition
identifiers:
  canonical_id: specialist-example
  taxonomy_variant: builder-example
  current_runtime_id: specialist_example
  runtime_config_id: specialist_specialist_example
  extension_directory: extensions/specialists/specialist-example
  delegate_tool_names:
    - delegate-to-specialist-example
  legacy_aliases:
    - specialist_example
    - specialist_specialist_example
display_name: Example Specialist
role: example-role
taxonomy:
  base_class: Builder
  variant: builder-example
  artifact_responsibility:
    - example_artifact
artifact_boundaries:
  excluded:
    - router-owned state
    - unrelated repository files
aliases:
  - name: specialist_example
    canonical_target: specialist-example
    reason: Example compatibility alias while runtime ids still use snake_case.
    lifecycle_state: deprecated
    cleanup_condition: Remove after runtime routing accepts canonical kebab-case ids.
    next_lifecycle_state: blocked-for-new-use
    next_advancement_condition: Validation can fail new specialist_example references while preserving legacy resolution.
definition_status: active
taxonomy_status: canonical
runtime_migration_status: not_started
migration_notes:
  - This template illustrates V2.1 taxonomy metadata; it is not runtime-loaded yet.
  - Runtime projection maps taxonomy.base_class, taxonomy.variant, and taxonomy.artifact_responsibility into TypeScript taxonomy metadata.
purpose: Describe the bounded responsibility this specialist owns.
onboarding:
  # Declarative metadata for future orchestrator context construction.
  # This documents onboarding intent; it is not runtime-loaded yet.
  profile: specialist-default
  layer1_conventions:
    - path: INDEX.md
      section: Route from here
      reason: Start from the root router before opening broader references.
    - path: docs/REPO_CONVENTIONS.md
      section: Layered Onboarding
      reason: Keep role-specific onboarding narrow and truthful.
  layer3_refs:
    - path: docs/LAYERED_ONBOARDING.md
      section: Specialist profile
      reason: Explains the default narrow specialist onboarding model.
    - path: DECISION_LOG.md
      reason: Pull only the smallest relevant durable decisions for the task family.
  notes: Declare durable onboarding hints here for the orchestrator; do not treat this block as active runtime input yet.
when_to_use:
  activation_conditions:
    - Use when the task needs this specialist's bounded capability.
    - Use when upstream artifacts satisfy the listed input contract.
  escalation_conditions:
    - Escalate when required context is missing or authority is insufficient.
    - Escalate when success would require work outside the declared boundary.
boundaries:
  scope:
    - Own a narrow, well-defined slice of the workflow.
    - Produce only the artifact fields listed below.
  non_goals:
    - Do not perform work owned by other specialists.
    - Do not mutate router-owned metadata or orchestration state.
  routing_class: specialist
  context_scope: Narrow-by-default packet context plus declared contract fields.
  default_read_set:
    - task packet objective
    - relevant files named in packet scope
  forbidden_by_default:
    - broad repository rewrites
    - hidden orchestration decisions
    - router-owned artifact fields
  task_boundary: Execute only the task packet objective inside declared scope.
  deliverable_boundary: Return only specialist-owned artifact fields and summary text.
  failure_boundary: Use failure or escalation when the objective cannot be completed truthfully.
  authority_flags:
    can_delegate: false
    can_synthesize: false
    can_update_handoff: false
    can_update_workflow_docs: false
    can_request_broader_context: true
allowed_actions:
  - Read packet-scoped context and directly related references.
  - Produce the declared artifact fields.
  - Escalate when constraints prevent truthful completion.
input_contract:
  fields:
    - name: upstream_field
      type: string
      required: true
      description: Example required upstream input for this specialist.
      source_specialist: specialist_planner
    - name: optional_supporting_list
      type: string[]
      required: false
      description: Example optional supporting context.
      source_specialist: specialist_builder
output_contract:
  fields:
    - name: primary_output
      type: string
      required: true
      description: Primary machine-readable field this specialist owns.
    - name: supporting_items
      type: string[]
      required: false
      description: Optional supporting machine-readable details.
status_semantics:
  success: All required artifact fields were produced and the objective was completed inside scope.
  partial: Some useful structured output was produced, but downstream routing should expect follow-up work.
  failure: The task could not be completed and no truthful in-scope completion is available.
  escalation: Human or orchestrator intervention is needed before safe progress can continue.
artifact_template:
  template_id: example-artifact
  artifact_type: example_artifact
  summary_guidance: Summarize the outcome in one or two sentences derived from the structured fields.
  fields:
    - name: primary_output
      type: string
      required: true
      description: Core artifact field owned by this specialist.
    - name: supporting_items
      type: string[]
      required: false
      description: Supplemental artifact details owned by this specialist.
editable_fields:
  - primary_output
  - supporting_items
read_only_fields:
  - artifactId
  - teamSessionId
  - taskPacketId
transition_notes:
  success: Downstream routing may consume the declared output fields directly.
  partial: Downstream routing must inspect the structured fields that are present and follow explicit team rules.
  failure: Do not infer missing required fields; route according to team failure handling.
  escalation: Preserve the reason and suggested action for orchestrator or human review.
prompt_requirements:
  role_description: One-sentence description of how this specialist should frame its work.
  working_style:
    reasoning: Describe the default reasoning pattern this specialist should follow.
    communication: Describe the expected output style and evidence level.
    risk: Describe the specialist's risk posture.
    default_bias: Describe the specialist's default optimization bias.
  constraints:
    - Constraint one for bounded execution.
    - Constraint two for truthful structured output.
  anti_patterns:
    - Anti-pattern one to avoid.
    - Anti-pattern two to avoid.
validation_requirements:
  contract_rules:
    - Required output fields must match the declared types.
    - Input and output names should align with runtime vocabulary where practical.
  adequacy_checks:
    - Summary text should be derivable from the structured artifact.
    - Produced fields should remain inside the declared editable field list.
  taxonomy_rules:
    - taxonomy.base_class must be one of Planner, Scribe, Builder, Reviewer, or null for out-of-taxonomy utilities.
    - taxonomy.variant must be null for generic base specialists or a base-class-prefixed kebab-case value.
    - identifiers.canonical_id must match taxonomy.variant for variants or the generic base specialist id for base specialists.
    - Runtime projection uses taxonomy fields only; artifact_boundaries.excluded is documentation and contract context, not runtime taxonomy metadata.
  alias_lifecycle_rules:
    - Deprecated aliases must name the canonical target, reason, lifecycle state, cleanup condition, next lifecycle state, and next advancement condition.
variant_contract:
  inherits:
    - universal-specialist-contract
    - repository-contract
    - base-class:Builder
  constraints:
    - Do only the variant-specific work described by taxonomy.artifact_responsibility.
    - Escalate if the task asks for excluded artifacts.
  output_template_refs:
    - example-artifact
