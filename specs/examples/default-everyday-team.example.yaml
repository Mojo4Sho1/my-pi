# EXAMPLE ONLY: V2 state-machine-ready team definition artifact.
# This file illustrates planner -> builder -> reviewer as the default everyday team.
schema_version: "v2.1"
artifact_kind: team_definition
example: true
team_id: default-everyday-team
canonical_name: default-everyday-team
current_runtime_id: default-everyday-team
display_name: Default Everyday Team
definition_status: active
runtime_migration_status: not_started
migration_notes:
  - Illustrates the D-T8 default everyday team as state-machine-ready YAML.
purpose: Plan, implement, and review a bounded everyday coding task.
members:
  - planner
  - builder
  - reviewer
aliases: []
entry_contract:
  fields:
    - name: objective
      type: string
      required: true
      description: Primary task objective.
    - name: relevantFiles
      type: string[]
      required: false
      description: Optional scoped files for the task.
state_machine:
  start_state: planning
  terminal_states:
    - done
    - failed
  states:
    planning:
      type: specialist
      target:
        kind: specialist
        canonical_id: planner
        current_runtime_id: planner
      transitions:
        - on: success
          to: building
        - on: partial
          to: failed
        - on: failure
          to: failed
        - on: escalation
          to: failed
    building:
      type: specialist
      target:
        kind: specialist
        canonical_id: builder
        current_runtime_id: builder
      transitions:
        - on: success
          to: review
        - on: partial
          to: planning
          max_iterations: 1
        - on: failure
          to: planning
          max_iterations: 1
        - on: escalation
          to: failed
    review:
      type: specialist
      target:
        kind: specialist
        canonical_id: reviewer
        current_runtime_id: reviewer
      transitions:
        - on: success
          to: done
        - on: partial
          to: building
          max_iterations: 1
        - on: failure
          to: building
          max_iterations: 1
        - on: escalation
          to: failed
    done:
      type: terminal
      target:
        kind: orchestrator
        canonical_id: orchestrator
      transitions: []
    failed:
      type: terminal
      target:
        kind: orchestrator
        canonical_id: orchestrator
      transitions: []
# Compatibility view only. These entries must match state_machine.states.*.target.
state_to_specialist_mapping:
  planning: planner
  building: builder
  review: reviewer
  done: orchestrator
  failed: orchestrator
per_state_expected_artifact:
  planning:
    consumes:
      - objective
      - relevantFiles
    produces:
      - steps
      - dependencies
      - risks
    editable_fields:
      - steps
      - dependencies
      - risks
    read_only_fields:
      - artifactId
      - teamSessionId
  building:
    consumes:
      - steps
      - dependencies
      - risks
    produces:
      - modifiedFiles
      - changeDescription
    editable_fields:
      - modifiedFiles
      - changeDescription
    read_only_fields:
      - artifactId
      - teamSessionId
  review:
    consumes:
      - modifiedFiles
      - changeDescription
    produces:
      - verdict
      - findings
      - summary
    editable_fields:
      - verdict
      - findings
      - summary
    read_only_fields:
      - artifactId
      - teamSessionId
  done:
    consumes:
      - verdict
      - findings
      - summary
    produces:
      - passed
      - modifiedFiles
    editable_fields: []
    read_only_fields:
      - prior_step_artifacts
  failed:
    consumes:
      - failure_reason
    produces:
      - passed
      - modifiedFiles
    editable_fields: []
    read_only_fields:
      - prior_step_artifacts
transition_rules:
  planning:
    success: Move to building once a plan artifact exists.
    partial: Stop as failed for this simple team.
    failure: Stop as failed.
    escalation: Stop as failed and surface the escalation.
  building:
    success: Move to review.
    partial: Return to planning within the loop limit.
    failure: Return to planning within the loop limit.
    escalation: Stop as failed and surface the escalation.
  review:
    success: Finish the run.
    partial: Return to building within the loop limit.
    failure: Return to building within the loop limit.
    escalation: Stop as failed and surface the escalation.
  done:
    success: Terminal state; no further routing.
    partial: Not applicable.
    failure: Not applicable.
    escalation: Not applicable.
  failed:
    success: Not applicable.
    partial: Not applicable.
    failure: Terminal state; no further routing.
    escalation: Terminal state; no further routing.
partial_handling:
  planning: Treat partial planning as terminal failure.
  building: Route partial implementation to planning for replanning.
  review: Route partial review to building for fixes.
loop_limits:
  - from: building
    to: planning
    on: partial
    max_iterations: 1
  - from: building
    to: planning
    on: failure
    max_iterations: 1
  - from: review
    to: building
    on: partial
    max_iterations: 1
  - from: review
    to: building
    on: failure
    max_iterations: 1
exit_contract:
  fields:
    - name: passed
      type: boolean
      required: true
      description: Whether the team completed successfully.
    - name: modifiedFiles
      type: string[]
      required: true
      description: Files changed by the builder.
final_result_requirements:
  required_fields:
    - passed
    - modifiedFiles
  derived_from_states:
    - building
    - review
  success_condition: Reach done after review approves or returns success-level findings.
