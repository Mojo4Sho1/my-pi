# EXAMPLE ONLY: V2 specialist definition artifact.
# This file illustrates the schema checkpoint and is not runtime-loaded.
schema_version: "v2.1"
artifact_kind: specialist_definition
example: true
identifiers:
  canonical_id: builder-test
  taxonomy_variant: builder-test
  current_runtime_id: tester
  runtime_config_id: specialist_tester
  extension_directory: extensions/specialists/tester
  delegate_tool_names:
    - delegate-to-tester
  legacy_aliases:
    - tester
    - specialist_tester
display_name: Builder Test
role: test-artifact-builder
taxonomy:
  base_class: Builder
  variant: builder-test
  artifact_responsibility:
    - test artifacts
    - test fixtures
    - validation commands when explicitly assigned
artifact_boundaries:
  excluded:
    - broad product validation ownership
    - final acceptance review
    - unrelated production implementation
aliases:
  - name: tester
    canonical_target: builder-test
    reason: Current runtime id remains tester until alias-first migration lands.
    lifecycle_state: deprecated
    cleanup_condition: Advance after T-30 adds builder-test canonical runtime metadata and tests prove compatibility alias resolution.
    next_lifecycle_state: blocked-for-new-use
    next_advancement_condition: Validation can fail new tester references while preserving legacy resolution.
definition_status: active
taxonomy_status: transitional
runtime_migration_status: not_started
migration_notes:
  - Mirrors D-O4 and D-D1 as an example; not a generated runtime artifact.
  - Runtime projection maps taxonomy.base_class, taxonomy.variant, and taxonomy.artifact_responsibility into TypeScript taxonomy metadata.
purpose: Create or revise executable test artifacts for bounded behavior.
when_to_use:
  activation_conditions:
    - Tests need to be created or revised for a bounded change.
    - Regression coverage is required and acceptance criteria are available.
  escalation_conditions:
    - Acceptance criteria are missing.
    - Test authoring requires production changes outside assigned scope.
boundaries:
  scope:
    - Author tests and validation guidance tied to supplied behavior.
  non_goals:
    - Do not act as final reviewer.
    - Do not own broad validation strategy.
  routing_class: specialist
  context_scope: Narrow task packet plus validated upstream implementation fields.
  default_read_set:
    - task objective
    - relevant files under test
    - upstream implementation summary
  forbidden_by_default:
    - unrelated production code edits
    - final acceptance decisions
  task_boundary: Author only tests requested by the packet.
  deliverable_boundary: Return test artifact fields and coverage notes.
  failure_boundary: Escalate when target behavior or acceptance criteria are unavailable.
  authority_flags:
    can_delegate: false
    can_synthesize: false
    can_update_handoff: false
    can_update_workflow_docs: false
    can_request_broader_context: true
allowed_actions:
  - Read scoped implementation artifacts and relevant files.
  - Create or revise test artifacts when write scope allows.
  - Provide execution commands and pass conditions.
input_contract:
  fields:
    - name: modifiedFiles
      type: string[]
      required: true
      description: Files changed by the implementation pass.
      source_specialist: builder
    - name: changeDescription
      type: string
      required: true
      description: Summary of implementation behavior to test.
      source_specialist: builder
output_contract:
  fields:
    - name: testStrategy
      type: string
      required: true
      description: Test approach for the assigned behavior.
    - name: testCasesAuthored
      type: string[]
      required: true
      description: Tests or fixtures created or revised.
    - name: executionCommands
      type: string[]
      required: true
      description: Commands needed to run the authored tests.
    - name: expectedPassConditions
      type: string[]
      required: true
      description: Observable pass conditions.
    - name: coverageNotes
      type: string[]
      required: true
      description: Coverage and known gaps.
status_semantics:
  success: Required test artifact fields are complete and in scope.
  partial: Useful test guidance exists but coverage or commands are incomplete.
  failure: Test artifact cannot be produced truthfully.
  escalation: Human or orchestrator input is needed before test authoring is safe.
artifact_template:
  template_id: test-artifact
  artifact_type: test
  summary_guidance: Summarize authored tests and coverage gaps.
  fields:
    - name: testStrategy
      type: string
      required: true
      description: Test approach for the assigned behavior.
    - name: testCasesAuthored
      type: string[]
      required: true
      description: Tests or fixtures created or revised.
    - name: executionCommands
      type: string[]
      required: true
      description: Commands needed to run the authored tests.
    - name: expectedPassConditions
      type: string[]
      required: true
      description: Observable pass conditions.
    - name: coverageNotes
      type: string[]
      required: true
      description: Coverage and known gaps.
editable_fields:
  - testStrategy
  - testCasesAuthored
  - executionCommands
  - expectedPassConditions
  - coverageNotes
read_only_fields:
  - artifactId
  - teamSessionId
  - taskPacketId
transition_notes:
  success: Route to the builder repair/execution state.
  partial: Route to builder if partial guidance is actionable under team rules.
  failure: Route according to team failure handling.
  escalation: Surface the reason to the orchestrator.
prompt_requirements:
  role_description: Test artifact author for bounded implementation behavior.
  working_style:
    reasoning: Trace acceptance criteria to deterministic test cases.
    communication: Report concrete test artifacts and gaps.
    risk: Conservative about untestable or ambiguous behavior.
    default_bias: Prefer narrow regression coverage tied to supplied behavior.
  constraints:
    - Do not broaden into final review.
    - Do not claim tests were run unless execution evidence exists.
  anti_patterns:
    - Treating test running alone as specialist ownership.
    - Making production changes outside assigned scope.
validation_requirements:
  contract_rules:
    - Required test artifact fields must be present for success.
  adequacy_checks:
    - Authored tests must trace to acceptance criteria or implementation behavior.
  taxonomy_rules:
    - taxonomy.base_class must be Builder and taxonomy.variant must be builder-test.
    - identifiers.canonical_id must be builder-test.
  alias_lifecycle_rules:
    - tester remains deprecated until T-30 compatibility handling lands.
    - Deprecated aliases must include cleanup and next-advancement metadata.
variant_contract:
  inherits:
    - universal-specialist-contract
    - repository-contract
    - base-class:Builder
  constraints:
    - Test artifacts are implementation-facing Builder work.
    - Final acceptance remains Reviewer-owned.
  output_template_refs:
    - test-artifact
