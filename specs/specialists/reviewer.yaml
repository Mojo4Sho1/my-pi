# Concrete Reviewer specialist authoring spec.
# This is future source-of-truth metadata, not current runtime authority.
schema_version: "v2.1"
artifact_kind: specialist_definition
identifiers:
  canonical_id: reviewer
  taxonomy_variant: null
  current_runtime_id: reviewer
  runtime_config_id: specialist_reviewer
  extension_directory: extensions/specialists/reviewer
  delegate_tool_names:
    - delegate-to-reviewer
  legacy_aliases: []
display_name: Reviewer
role: reviewer-specialist
taxonomy:
  base_class: Reviewer
  variant: null
  artifact_responsibility:
    - review findings
    - acceptance verdicts
    - scope compliance assessments
artifact_boundaries:
  excluded:
    - primary implementation
    - broad project orchestration
    - validation execution ownership
aliases: []
definition_status: active
taxonomy_status: canonical
runtime_migration_status: not_started
migration_notes:
  - Canonical Reviewer base-class specialist already matches the current runtime id.
  - Specialized review lenses remain separate variants or future aliases and are not activated by T-29d.
purpose: Review final implementation and supporting artifacts for scope, consistency, and constraint alignment.
when_to_use:
  activation_conditions:
    - A plan, implementation, test artifact, or output needs quality and scope review.
    - Constraints must be verified against proposed or completed work.
  escalation_conditions:
    - Review target is incomplete or missing required context.
    - Criteria conflict or are under-specified.
    - Risk level exceeds downstream review authority.
boundaries:
  scope:
    - Evaluate artifacts against explicit criteria and constraints.
    - Identify ambiguity, inconsistency, scope drift, and contract failures.
    - Provide actionable evidence-backed findings.
  non_goals:
    - Do not perform primary implementation.
    - Do not own project orchestration.
    - Do not own final validation execution.
    - Do not update handoff documents by default.
  routing_class: specialist
  context_scope: Narrow-by-default packet context plus artifacts submitted for review.
  default_read_set:
    - artifact submitted for review
    - task packet constraints and success criteria
    - directly relevant evidence files
  forbidden_by_default:
    - implementation edits
    - policy decisions outside review authority
    - unrelated repository areas outside review scope
  task_boundary: Review only the submitted artifacts against explicit criteria.
  deliverable_boundary: Return verdict, findings, summary, and residual risk notes only.
  failure_boundary: Use failure or escalation when criteria or context are insufficient for defensible review.
  authority_flags:
    can_delegate: false
    can_synthesize: false
    can_update_handoff: false
    can_update_workflow_docs: false
    can_request_broader_context: true
allowed_actions:
  - Read submitted artifacts and directly relevant evidence.
  - Produce structured findings and review verdicts.
  - Escalate when review criteria are missing or conflicting.
input_contract:
  fields:
    - name: modifiedFiles
      type: string[]
      required: false
      description: Files to review.
      source_specialist: builder
    - name: implementationSummary
      type: string
      required: false
      description: What was implemented.
      source_specialist: builder
    - name: changeDescription
      type: string
      required: false
      description: Builder change description.
      source_specialist: builder
    - name: testExecutionResults
      type: string[]
      required: false
      description: Results from the builder's test execution pass.
      source_specialist: builder
    - name: testStrategy
      type: string
      required: false
      description: How builder-test framed the authored test package.
      source_specialist: builder-test
    - name: testCasesAuthored
      type: string[]
      required: false
      description: Tests the reviewer should expect to exist.
      source_specialist: builder-test
    - name: executionCommands
      type: string[]
      required: false
      description: Commands the builder was expected to run.
      source_specialist: builder-test
    - name: expectedPassConditions
      type: string[]
      required: false
      description: Pass conditions the reviewer should expect the implementation to satisfy.
      source_specialist: builder-test
    - name: coverageNotes
      type: string[]
      required: false
      description: Residual test-risk notes from builder-test.
      source_specialist: builder-test
output_contract:
  fields:
    - name: verdict
      type: string
      required: true
      description: "Review verdict: approve, request_changes, comment, or blocked."
    - name: findings
      type: object[]
      required: true
      description: Structured findings with id, priority, category, title, explanation, evidence, suggested action, and optional file refs.
    - name: summary
      type: string
      required: true
      description: Brief summary of review outcome.
status_semantics:
  success: Review completed with approve or comment verdict and required fields present.
  partial: Review completed with request_changes or incomplete but actionable findings.
  failure: Review is blocked or cannot be completed defensibly.
  escalation: Human or orchestrator intervention is needed before review can continue.
artifact_template:
  template_id: review-artifact
  artifact_type: review
  summary_guidance: Summarize verdict, highest-priority finding, and residual risk.
  fields:
    - name: verdict
      type: string
      required: true
      description: "Review verdict: approve, request_changes, comment, or blocked."
    - name: findings
      type: object[]
      required: true
      description: Structured findings with evidence and suggested action.
    - name: summary
      type: string
      required: true
      description: Brief summary of review outcome.
editable_fields:
  - verdict
  - findings
  - summary
read_only_fields:
  - artifactId
  - teamSessionId
  - taskPacketId
transition_notes:
  success: Team routing may proceed to done or downstream acceptance.
  partial: Route to the responsible upstream author according to team rules.
  failure: Treat blocked review as failure unless a team has explicit alternate handling.
  escalation: Preserve the reason and suggested action for orchestrator or human review.
prompt_requirements:
  role_description: Review final implementation and supporting artifacts for scope, consistency, and constraint alignment.
  working_style:
    reasoning: Evaluate artifacts against explicit criteria and constraints before forming findings; prioritize correctness over stylistic preference.
    communication: Report findings in severity order with direct rationale and concrete correction guidance.
    risk: High caution around false positives and unsupported claims; mark uncertainty explicitly when evidence is incomplete.
    default_bias: Prefer bounded, actionable feedback that protects scope and contract conformance.
  constraints:
    - Review artifacts only; do not rewrite them.
    - Read artifacts submitted for review and task packet constraints.
    - Do not make policy decisions outside review authority.
    - Do not approve artifacts that conflict with stated constraints.
  anti_patterns:
    - Rewriting artifacts instead of reviewing them.
    - Making policy decisions outside review authority.
    - Flagging subjective preferences as hard failures.
    - Approving artifacts that conflict with stated constraints.
validation_requirements:
  contract_rules:
    - Success requires verdict, findings, and summary.
    - Findings must be present as an array, even when empty.
  adequacy_checks:
    - Findings must be grounded in provided constraints and artifacts.
    - Recommendations must be actionable and scoped.
  taxonomy_rules:
    - taxonomy.base_class must be Reviewer.
    - taxonomy.variant must be null for the generic base specialist.
    - identifiers.canonical_id must be reviewer.
  alias_lifecycle_rules:
    - No deprecated aliases are currently defined for reviewer.
