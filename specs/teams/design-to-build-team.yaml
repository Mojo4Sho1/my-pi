# Canonical conditional design-to-build team authoring spec.
# This is a future source-of-truth authoring input, not current runtime authority.
schema_version: "v2.1"
artifact_kind: team_definition
team_id: design-to-build-team
canonical_name: design-to-build-team
current_runtime_id: design-to-build-team
display_name: Design To Build Team
definition_status: active
runtime_migration_status: not_started
migration_notes:
  - D-T9 conditional Scribe insertion expressed as state-machine-ready YAML.
  - Use only when a task needs specification, schema, or routing design before implementation.
purpose: Add a Scribe design pass before bounded implementation and review.
members:
  - planner
  - scribe-spec
  - builder
  - reviewer
aliases: []
entry_contract:
  fields:
    - name: objective
      type: string
      required: true
      description: Primary design-to-build objective.
    - name: designNeed
      type: string
      required: true
      description: Why a Scribe design pass is required.
state_machine:
  start_state: planning
  terminal_states:
    - done
    - failed
  states:
    planning:
      type: specialist
      target:
        kind: specialist
        canonical_id: planner
        current_runtime_id: planner
      transitions:
        - on: success
          to: scribing
        - on: partial
          to: failed
        - on: failure
          to: failed
        - on: escalation
          to: failed
    scribing:
      type: specialist
      target:
        kind: specialist
        canonical_id: scribe-spec
        current_runtime_id: spec-writer
      transitions:
        - on: success
          to: building
        - on: partial
          to: planning
          max_iterations: 1
        - on: failure
          to: planning
          max_iterations: 1
        - on: escalation
          to: failed
    building:
      type: specialist
      target:
        kind: specialist
        canonical_id: builder
        current_runtime_id: builder
      transitions:
        - on: success
          to: review
        - on: partial
          to: scribing
          max_iterations: 1
        - on: failure
          to: scribing
          max_iterations: 1
        - on: escalation
          to: failed
    review:
      type: specialist
      target:
        kind: specialist
        canonical_id: reviewer
        current_runtime_id: reviewer
      transitions:
        - on: success
          to: done
        - on: partial
          to: building
          max_iterations: 1
        - on: failure
          to: building
          max_iterations: 1
        - on: escalation
          to: failed
    done:
      type: terminal
      target:
        kind: orchestrator
        canonical_id: orchestrator
      transitions: []
    failed:
      type: terminal
      target:
        kind: orchestrator
        canonical_id: orchestrator
      transitions: []
# Compatibility view only. These entries must match state_machine.states.*.target.
state_to_specialist_mapping:
  planning: planner
  scribing: scribe-spec
  building: builder
  review: reviewer
  done: orchestrator
  failed: orchestrator
per_state_expected_artifact:
  planning:
    consumes:
      - objective
      - designNeed
    produces:
      - steps
      - dependencies
      - risks
    editable_fields:
      - steps
      - dependencies
      - risks
    read_only_fields:
      - artifactId
      - teamSessionId
      - taskPacketId
  scribing:
    consumes:
      - steps
      - dependencies
      - risks
    produces:
      - purpose
      - boundaries
      - successCriteria
    editable_fields:
      - purpose
      - boundaries
      - successCriteria
    read_only_fields:
      - artifactId
      - teamSessionId
      - taskPacketId
  building:
    consumes:
      - purpose
      - boundaries
      - successCriteria
    produces:
      - modifiedFiles
      - changeDescription
    editable_fields:
      - modifiedFiles
      - changeDescription
    read_only_fields:
      - artifactId
      - teamSessionId
      - taskPacketId
  review:
    consumes:
      - modifiedFiles
      - changeDescription
    produces:
      - verdict
      - findings
      - summary
    editable_fields:
      - verdict
      - findings
      - summary
    read_only_fields:
      - artifactId
      - teamSessionId
      - taskPacketId
  done:
    consumes:
      - verdict
      - findings
      - summary
    produces:
      - passed
      - modifiedFiles
    editable_fields: []
    read_only_fields:
      - prior_step_artifacts
  failed:
    consumes:
      - failure_reason
    produces:
      - passed
      - modifiedFiles
    editable_fields: []
    read_only_fields:
      - prior_step_artifacts
transition_rules:
  planning:
    success: Move to Scribe design once planning succeeds.
    partial: Stop as failed because the design gate needs a complete plan.
    failure: Stop as failed.
    escalation: Stop as failed and surface the escalation.
  scribing:
    success: Move to implementation once the design artifact exists.
    partial: Return to planning within the loop limit.
    failure: Return to planning within the loop limit.
    escalation: Stop as failed and surface the escalation.
  building:
    success: Move to review.
    partial: Return to scribing within the loop limit.
    failure: Return to scribing within the loop limit.
    escalation: Stop as failed and surface the escalation.
  review:
    success: Finish the team run.
    partial: Return to building within the loop limit.
    failure: Return to building within the loop limit.
    escalation: Stop as failed and surface the escalation.
  done:
    success: Terminal state; no further routing.
    partial: Not applicable.
    failure: Not applicable.
    escalation: Not applicable.
  failed:
    success: Not applicable.
    partial: Not applicable.
    failure: Terminal state; no further routing.
    escalation: Terminal state; no further routing.
partial_handling:
  planning: Treat partial planning as terminal failure.
  scribing: Route partial design output to planning.
  building: Route partial implementation to scribing.
  review: Route partial review to building.
loop_limits:
  - from: scribing
    to: planning
    on: partial
    max_iterations: 1
  - from: scribing
    to: planning
    on: failure
    max_iterations: 1
  - from: building
    to: scribing
    on: partial
    max_iterations: 1
  - from: building
    to: scribing
    on: failure
    max_iterations: 1
  - from: review
    to: building
    on: partial
    max_iterations: 1
  - from: review
    to: building
    on: failure
    max_iterations: 1
exit_contract:
  fields:
    - name: passed
      type: boolean
      required: true
      description: Whether the team completed successfully.
    - name: modifiedFiles
      type: string[]
      required: true
      description: Files changed by the builder.
final_result_requirements:
  required_fields:
    - passed
    - modifiedFiles
  derived_from_states:
    - building
    - review
  success_condition: Reach done after design, implementation, and review artifacts satisfy their contracts.
