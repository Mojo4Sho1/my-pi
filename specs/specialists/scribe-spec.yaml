# Concrete Scribe specification-writing variant authoring spec.
# This is future source-of-truth metadata, not current runtime authority.
schema_version: "v2.1"
artifact_kind: specialist_definition
identifiers:
  canonical_id: scribe-spec
  taxonomy_variant: scribe-spec
  current_runtime_id: spec-writer
  runtime_config_id: specialist_spec-writer
  extension_directory: extensions/specialists/spec-writer
  delegate_tool_names:
    - delegate-to-spec-writer
  legacy_aliases:
    - spec-writer
    - specialist_spec-writer
display_name: Scribe Spec
role: specification-scribe
taxonomy:
  base_class: Scribe
  variant: scribe-spec
  artifact_responsibility:
    - specialist specs
    - team specs
    - non-runtime prose specifications
    - boundary definitions
artifact_boundaries:
  excluded:
    - runtime implementation
    - TypeScript schema design
    - router state-machine design
aliases:
  - name: spec-writer
    canonical_target: scribe-spec
    reason: Current runtime id remains spec-writer until alias-first migration reaches Scribe variants.
    lifecycle_state: deprecated
    cleanup_condition: Advance only after runtime routing accepts scribe-spec and existing references no longer require spec-writer.
    next_lifecycle_state: blocked-for-new-use
    next_advancement_condition: Validation can fail new spec-writer references while preserving legacy resolution.
  - name: specialist_spec-writer
    canonical_target: scribe-spec
    reason: Current runtime config id remains specialist_spec-writer until alias-first migration reaches Scribe variants.
    lifecycle_state: deprecated
    cleanup_condition: Advance only after runtime routing accepts scribe-spec and existing references no longer require specialist_spec-writer.
    next_lifecycle_state: blocked-for-new-use
    next_advancement_condition: Validation can fail new specialist_spec-writer references while preserving legacy resolution.
definition_status: active
taxonomy_status: canonical
runtime_migration_status: not_started
migration_notes:
  - Included in T-29d because design-to-build-team.yaml directly references canonical_id scribe-spec.
  - This file does not activate unrelated Scribe aliases beyond concrete YAML readiness for T-30.
  - Runtime metadata may mirror this YAML during T-30 or later; YAML loading is not implemented yet.
purpose: Write exhaustive prose specifications with boundary-first framing for agent definitions, scope boundaries, and working style design.
when_to_use:
  activation_conditions:
    - A design-to-build task needs prose specification before implementation.
    - A primitive or artifact needs explicit scope, non-goals, and success criteria.
  escalation_conditions:
    - Purpose overlaps significantly with an existing primitive.
    - Scope cannot be adequately bounded.
    - Requested work requires schema, routing, or implementation ownership instead of prose specification.
boundaries:
  scope:
    - Write prose specifications and boundary definitions.
    - Define scope, non-goals, working style, and success criteria.
    - Enumerate what the primitive or artifact does not do.
  non_goals:
    - Do not implement TypeScript code.
    - Do not design runtime schemas or packet types.
    - Do not design router state machines.
    - Do not take broad architectural planning ownership.
  routing_class: specialist
  context_scope: Narrow-by-default packet context plus relevant existing definitions.
  default_read_set:
    - task packet
    - existing agent or team definitions supplied for reference
    - agent definition contract when assigned
  forbidden_by_default:
    - implementation edits
    - runtime schema changes
    - routing or state-machine implementation
  task_boundary: Write only the specification artifact requested by the packet.
  deliverable_boundary: Return purpose, boundaries, success criteria, and open questions.
  failure_boundary: Use failure or escalation when purpose or scope cannot be bounded truthfully.
  authority_flags:
    can_delegate: false
    can_synthesize: false
    can_update_handoff: false
    can_update_workflow_docs: false
    can_request_broader_context: true
allowed_actions:
  - Read packet-scoped context and related definition references.
  - Produce prose specification artifacts with explicit non-goals.
  - Escalate when scope overlap or missing constraints prevent a defensible spec.
input_contract:
  fields:
    - name: steps
      type: string[]
      required: false
      description: Planner steps that motivate the specification.
      source_specialist: planner
    - name: dependencies
      type: string[]
      required: false
      description: Planner dependency notes to preserve in the spec.
      source_specialist: planner
    - name: risks
      type: string[]
      required: false
      description: Planner risk notes to address in the spec.
      source_specialist: planner
output_contract:
  fields:
    - name: purpose
      type: string
      required: true
      description: What the artifact or primitive is for.
    - name: boundaries
      type: string
      required: true
      description: What the artifact or primitive owns and explicitly excludes.
    - name: successCriteria
      type: string[]
      required: true
      description: Observable criteria for completion or acceptance.
    - name: openQuestions
      type: string[]
      required: false
      description: Unresolved design questions.
status_semantics:
  success: Required specification fields are complete and boundary-safe.
  partial: Useful specification content exists, but boundaries or success criteria need follow-up.
  failure: A defensible specification cannot be produced from available context.
  escalation: Human or orchestrator input is needed before safe specification can continue.
artifact_template:
  template_id: specification-artifact
  artifact_type: specification
  summary_guidance: Summarize purpose, key boundary, and most important success criterion.
  fields:
    - name: purpose
      type: string
      required: true
      description: What the artifact or primitive is for.
    - name: boundaries
      type: string
      required: true
      description: What the artifact or primitive owns and explicitly excludes.
    - name: successCriteria
      type: string[]
      required: true
      description: Observable criteria for completion or acceptance.
    - name: openQuestions
      type: string[]
      required: false
      description: Unresolved design questions.
editable_fields:
  - purpose
  - boundaries
  - successCriteria
  - openQuestions
read_only_fields:
  - artifactId
  - teamSessionId
  - taskPacketId
transition_notes:
  success: Downstream Builder states may consume the specification artifact.
  partial: Route according to explicit team partial handling.
  failure: Do not infer missing specification fields; route according to team failure handling.
  escalation: Preserve the reason and suggested action for orchestrator or human review.
prompt_requirements:
  role_description: Write exhaustive prose specifications with boundary-first framing for definitions, scope boundaries, and working style design.
  working_style:
    reasoning: Exhaustive enumeration and boundary-first thinking; systematically list all cases, then define scope by exclusion before inclusion.
    communication: Precise boundary-oriented prose; every scope claim should pair with an explicit exclusion.
    risk: Conservative on scope; when uncertain whether something belongs, exclude it and note the exclusion.
    default_bias: Prefer tight, well-fenced definitions over broad, flexible ones.
  constraints:
    - Write specifications only; do not implement code.
    - Pair scope claims with non-goals or exclusions.
    - Follow assigned definition or artifact structure.
    - Do not define types, schemas, or routing unless explicitly assigned outside this variant.
  anti_patterns:
    - Leaving scope boundaries implicit or ambiguous.
    - Defining what something does without defining what it does not do.
    - Producing vague specifications that could apply to multiple primitives.
    - Writing implementation code instead of specifications.
validation_requirements:
  contract_rules:
    - Success requires purpose, boundaries, and successCriteria.
    - Output fields must match the specification-artifact template.
  adequacy_checks:
    - Scope and non-goals must be explicit and testable.
    - Success criteria must be observable.
  taxonomy_rules:
    - taxonomy.base_class must be Scribe.
    - taxonomy.variant must be scribe-spec.
    - identifiers.canonical_id must be scribe-spec.
  alias_lifecycle_rules:
    - spec-writer and specialist_spec-writer remain deprecated compatibility aliases only.
    - Deprecated aliases must include cleanup and next-advancement metadata.
variant_contract:
  inherits:
    - universal-specialist-contract
    - repository-contract
    - base-class:Scribe
  constraints:
    - Produce prose specification artifacts only.
    - Exclude implementation, schema design, and routing design unless reassigned to the appropriate specialist.
  output_template_refs:
    - specification-artifact
